# Unitree lowstate telemetry recorder.
# No YAML/JSON dependency: plain key=value, comments start with '#'.

topic=rt/lowstate
lowcmd_topic=rt/lowcmd
network_mode=0
network_interface=eth10

output_dir=./unitree_logs
motor_count=29
sample_hz=500
summary_hz=1
max_queue_samples=40960
validate_crc=true
